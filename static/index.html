<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epistemic Engine v2</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap">
    <link rel="stylesheet" href="/static/styles.css">
    
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-force@3/dist/d3-force.min.js"></script>
</head>
<body>

    <div id="3d-graph"></div>

    <div id="ui-layer">
        
        <div id="legend" class="panel-glass">
            <div class="legend-section">
                <h4>CONCEPTS</h4>
                <div id="node-legend"></div>
            </div>
            <div class="legend-section" style="margin-top:12px; padding-top:8px; border-top:1px solid var(--border);">
                <h4>RELATIONS</h4>
                <div id="rel-legend"></div>
            </div>
        </div>

        <div id="top-right-group">
            <div id="graph-actions">
                <button id="btn-add-node" class="panel-glass action-btn" onclick="window.dispatch('ADD_NODE')">
                    ＋ Add Node
                </button>
                <button id="btn-link-mode" class="panel-glass action-btn" onclick="window.toggleLinkMode()">
                    🔗 Add Relation
                </button>
                <button class="panel-glass action-btn" onclick="window.dispatch('AI_ANALYZE')" style="color:#00c8a0;border-color:rgba(0,200,160,0.3);">
                    ✨ AI Analyze
                </button>
                <button class="panel-glass action-btn" onclick="window.dispatch('REFLOW')" title="Run force layout once then freeze" style="color:#8896b8;border-color:rgba(136,150,184,0.3);">
                    ⬡ Reflow
                </button>
                <button id="btn-save-positions" class="panel-glass action-btn" onclick="window.savePositions()" style="opacity:0.4; pointer-events:none;">
                    💾 Save Positions
                </button>
                <button class="panel-glass action-btn" onclick="window.dispatch('SETTINGS')" title="Node &amp; relation types">
                    ⚙ Settings
                </button>
            </div>
        </div>

        <div id="search-container" class="panel-glass">
            <input type="text" id="node-search" placeholder="Search concepts..." autocomplete="off">
            <div id="search-results"></div>
        </div>

        <div id="link-mode-indicator">
            LINK MODE: SELECT SOURCE NODE
        </div>

        <div id="time-controller" class="panel-glass">
            <div id="time-header">
                <span>Abstraction Level</span>
                <span id="current-time">L1</span>
            </div>
            <input type="range" id="time-slider" min="1" max="5" value="1">
            <div id="level-filter-row">
                <button id="btn-show-all-levels" class="level-filter-btn" title="Show all levels up to selected">
                    Show only L<span id="level-btn-label">1</span>
                </button>
            </div>
        </div>

        <div id="node-inspector" class="panel"></div>
        <div id="edge-inspector" class="panel"></div>
        
        <div id="link-modal" class="modal"></div>

    </div>

    <div id="tooltip"></div>

    <script type="module" src="/static/app.js"></script>

</body>
</html>
