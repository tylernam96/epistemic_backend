<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epistemic Engine v2</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap">
    <link rel="stylesheet" href="/static/styles.css">
    
    <script src="//unpkg.com/three"></script>
    <script src="//unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="//unpkg.com/3d-force-graph"></script>
</head>
<body>

    <div id="3d-graph"></div>

    <div id="ui-layer">
        
        <div id="legend" class="panel-glass">
            <div class="legend-section">
                <h4>CONCEPTS</h4>
                <div id="node-legend"></div>
            </div>
            <div class="legend-section" style="margin-top:12px; padding-top:8px; border-top:1px solid var(--border);">
                <h4>RELATIONS</h4>
                <div id="rel-legend"></div>
            </div>
        </div>

        <div id="top-right-group">
            <div id="search-container" class="panel-glass">
                <input type="text" id="node-search" placeholder="Search concepts..." autocomplete="off">
                <div id="search-results"></div>
            </div>
            
            <button id="btn-link-mode" class="panel-glass action-btn" onclick="window.toggleLinkMode()">
                🔗 Toggle Link Mode
            </button>
        </div>

        <div id="link-mode-indicator">
            LINK MODE ACTIVE: SELECT SOURCE NODE
        </div>

        <div id="time-controller" class="panel-glass">
            <div id="time-header">
                <span>Timeline Filter</span>
                <span id="current-time">All Time</span>
            </div>
            <input type="range" id="time-slider" min="0" max="100" value="100">
        </div>

        <div id="node-inspector" class="panel"></div>
        <div id="edge-inspector" class="panel"></div>
        
        <div id="link-modal" class="modal">
            </div>

    </div>

    <div id="tooltip"></div>

    <script type="module" src="/static/app.js"></script>

</body>
</html>
